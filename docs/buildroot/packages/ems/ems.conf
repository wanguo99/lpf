# EMS 配置文件
# 此文件将被安装到 /etc/ems.conf

# 日志级别: DEBUG, INFO, WARN, ERROR
LOG_LEVEL=INFO

# 日志输出: syslog, console, file
LOG_OUTPUT=syslog

# 日志文件路径（当 LOG_OUTPUT=file 时使用）
LOG_FILE=/var/log/ems.log

# CAN 总线配置
CAN_INTERFACE=can0
CAN_BITRATE=500000

# 串口配置
SERIAL_PORT=/dev/ttyS0
SERIAL_BAUDRATE=115200

# I2C 配置
I2C_BUS=/dev/i2c-1

# SPI 配置
SPI_BUS=/dev/spidev0.0
SPI_SPEED=1000000

# 运行时配置
ENABLE_WATCHDOG=yes
WATCHDOG_TIMEOUT=30
