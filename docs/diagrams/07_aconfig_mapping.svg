<!-- perf -->
<g id="node11" class="node">
<title>perf</title>
<polygon fill="#fffde7" stroke="black" points="353,-951.5 0,-951.5 0,-730.5 359,-730.5 359,-945.5 353,-951.5"/>
<polyline fill="none" stroke="black" points="353,-951.5 353,-945.5 "/>
<polyline fill="none" stroke="black" points="359,-945.5 353,-945.5 "/>
<text text-anchor="middle" x="179.5" y="-936.3" font-family="Arial" font-size="14.00">性能特性：</text>
<text text-anchor="middle" x="179.5" y="-905.3" font-family="Arial" font-size="14.00">• O(1) 查找：数组索引</text>
<text text-anchor="middle" x="179.5" y="-890.3" font-family="Arial" font-size="14.00">• 查询时间：~5ns (1&#45;2 条指令)</text>
<text text-anchor="middle" x="179.5" y="-875.3" font-family="Arial" font-size="14.00">• 缓存友好：连续内存</text>
<text text-anchor="middle" x="179.5" y="-860.3" font-family="Arial" font-size="14.00">• 无锁设计：初始化后只读</text>
<text text-anchor="middle" x="179.5" y="-845.3" font-family="Arial" font-size="14.00">• 零拷贝：返回 const 指针</text>
<text text-anchor="middle" x="179.5" y="-814.3" font-family="Arial" font-size="14.00">示例：</text>
<text text-anchor="middle" x="179.5" y="-799.3" font-family="Arial" font-size="14.00">const aconfig_tc_config_t *cfg =</text>
<text text-anchor="middle" x="179.5" y="-784.3" font-family="Arial" font-size="14.00"> &#160;&#160;&#160;ACONFIG_GetTcConfig(TC_SERVER_POWER_ON);</text>
<text text-anchor="middle" x="179.5" y="-753.3" font-family="Arial" font-size="14.00">// cfg&#45;&gt;device_type = DEVICE_BMC</text>
<text text-anchor="middle" x="179.5" y="-738.3" font-family="Arial" font-size="14.00">// cfg&#45;&gt;logic_index = 0</text>
</g>
