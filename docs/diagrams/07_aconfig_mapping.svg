<text text-anchor="middle" x="179.5" y="-1113.8" font-family="Arial" font-size="14.00">遥控命令执行后，自动失效相关遥测缓存：</text>
<text text-anchor="middle" x="179.5" y="-1082.8" font-family="Arial" font-size="14.00">• TC_SERVER_POWER_ON 失效：</text>
<text text-anchor="middle" x="179.5" y="-1067.8" font-family="Arial" font-size="14.00"> &#160;&#45; TM_SERVER_POWER_STATUS</text>
<text text-anchor="middle" x="179.5" y="-1052.8" font-family="Arial" font-size="14.00"> &#160;&#45; TM_SERVER_CPU_TEMP</text>
<text text-anchor="middle" x="179.5" y="-1037.8" font-family="Arial" font-size="14.00"> &#160;</text>
<text text-anchor="middle" x="179.5" y="-1022.8" font-family="Arial" font-size="14.00">• TC_MCU_RESET 失效：</text>
<text text-anchor="middle" x="179.5" y="-1007.8" font-family="Arial" font-size="14.00"> &#160;&#45; TM_MCU_STATUS</text>
<text text-anchor="middle" x="179.5" y="-992.8" font-family="Arial" font-size="14.00"> &#160;</text>
<text text-anchor="middle" x="179.5" y="-977.8" font-family="Arial" font-size="14.00">确保遥测数据实时性</text>
