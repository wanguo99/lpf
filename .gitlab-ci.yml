# GitLab CI Configuration for EMS Test Suite
# Supports JUnit XML report integration with GitLab's test reporting

stages:
  - build
  - test
  - report

variables:
  BUILD_DIR: "_build"

# Template for test jobs
.test_template: &test_template
  stage: test
  image: ubuntu:22.04
  before_script:
    - apt-get update && apt-get install -y build-essential cmake python3 libncurses-dev flex bison
  artifacts:
    when: always
    reports:
      junit: "*.xml"
    paths:
      - "*.xml"
      - "*.json"
    expire_in: 1 week

# Build stage
build:
  stage: build
  image: ubuntu:22.04
  before_script:
    - apt-get update && apt-get install -y build-essential cmake python3 libncurses-dev flex bison
  script:
    - python3 build.py config tests_x86_full_defconfig
    - python3 build.py build
  artifacts:
    paths:
      - ${BUILD_DIR}/
      - .config
    expire_in: 1 hour

# Unit tests - full suite
test:unit:full:
  <<: *test_template
  dependencies:
    - build
  script:
    - ${BUILD_DIR}/bin/ems-test -a --category unit --format junit --output unit-full-results.xml
    - ${BUILD_DIR}/bin/ems-test -a --category unit --format json --output unit-full-results.json

# Unit tests - fast only (for quick feedback)
test:unit:fast:
  <<: *test_template
  dependencies:
    - build
  script:
    - ${BUILD_DIR}/bin/ems-test -a --category unit --fast --format junit --output unit-fast-results.xml

# Unit tests - by layer
test:unit:osal:
  <<: *test_template
  dependencies:
    - build
  script:
    - ${BUILD_DIR}/bin/ems-test -L OSAL --category unit --format junit --output unit-osal-results.xml

test:unit:hal:
  <<: *test_template
  dependencies:
    - build
  script:
    - ${BUILD_DIR}/bin/ems-test -L HAL --category unit --format junit --output unit-hal-results.xml

test:unit:pdl:
  <<: *test_template
  dependencies:
    - build
  script:
    - ${BUILD_DIR}/bin/ems-test -L PDL --category unit --format junit --output unit-pdl-results.xml

# Performance tests
test:performance:
  <<: *test_template
  dependencies:
    - build
  script:
    - ${BUILD_DIR}/bin/ems-test -a --category performance --format junit --output perf-results.xml
    - ${BUILD_DIR}/bin/ems-test -a --category performance --format json --output perf-results.json
  allow_failure: true

# Stress tests
test:stress:
  <<: *test_template
  dependencies:
    - build
  script:
    - ${BUILD_DIR}/bin/ems-test -a --category stress --format junit --output stress-results.xml
  allow_failure: true
  timeout: 30m

# System integration tests
test:system:
  <<: *test_template
  dependencies:
    - build
  script:
    - ${BUILD_DIR}/bin/ems-test -a --category system --format junit --output system-results.xml
  allow_failure: true

# Tests without hardware requirements (for CI runners)
test:no-hardware:
  <<: *test_template
  dependencies:
    - build
  script:
    - ${BUILD_DIR}/bin/ems-test -a --exclude-hardware --format junit --output no-hardware-results.xml
    - ${BUILD_DIR}/bin/ems-test -a --exclude-hardware --format json --output no-hardware-results.json

# Generate consolidated test report
report:summary:
  stage: report
  image: ubuntu:22.04
  dependencies:
    - test:unit:full
    - test:performance
    - test:stress
    - test:system
  script:
    - echo "Test Summary Report"
    - echo "==================="
    - for file in *.xml; do echo "Report: $file"; done
    - for file in *.json; do echo "Results: $file"; done
  artifacts:
    paths:
      - "*.xml"
      - "*.json"
    expire_in: 1 month
  when: always
